// Pre-render sprites to offscreen canvases for fast blitting
function renderSprite(b, col) {
  const oc = document.createElement('canvas');
  oc.width = b.w * SCALE; oc.height = b.h * SCALE;
  const c2 = oc.getContext('2d');
  c2.fillStyle = col || BODY_COL;
  for (let y = 0; y < b.h; y++) {
    const row = b.rows[y];
    for (let x = 0; x < row.length; x++) {
      if (row[x] === '#') c2.fillRect(x * SCALE, y * SCALE, SCALE, SCALE);
    }
  }
  return oc;
}

let highScore    = 0;
let runningTime  = 0;        // ms since episode start (CLEAR_TIME gate)

let obstacleHistory = [];    // last spawned type names (duplication rule)

let obstaclesCleared = 0;    // authoritative clear counter (RL reward source)

let lastTime     = null;

      jumping      = true;
      ducking      = false;
      speedDrop    = false;
      jumpVelocity = INITIAL_JUMP_VELOCITY - (speed || currentSpeed) / 10;
    }
  },
  setDuck(v) {
    if (crashed) return;
    if (v) {
      if (jumping) {
        speedDrop = true;          // original: duck mid-air = fast fall
      } else {
        ducking = true;
      }
    } else {
      ducking   = false;
      speedDrop = false;
    }
  },
};

  get tRex()         { return tRex; },
  get started()      { return started; },
  set started(v)     { started = !!v; },
  get activated()    { return started; },
  set activated(v)   { started = !!v; },

  get horizon() {
    return {
      obstacles: obstacles.map(ob => ({
        xPos:  ob.x,
        yPos:  ob.y,
        width: ob.w,
        typeConfig: { height: ob.h, type: ob.type },
      })),
    };
  },

  restart() {
    crashed      = false;
    distanceRan  = 0;
    rawDistance  = 0;
    currentSpeed = INITIAL_SPEED;
    dinoY        = TREX_GROUND_Y;
    jumpVelocity = 0;
    jumping      = false;
    ducking      = false;
    speedDrop    = false;
    runningTime  = 0;

    obstaclesCleared = 0;

    // In lockstep mode the agent drives stepping; don't resume the rAF loop.
    if (!window.__lockstep && !animId) animId = requestAnimationFrame(loop);

};

// ── Keyboard (human play / demos) ────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (crashed) runner.restart();
    else { started = true; tRex.startJump(currentSpeed); }
  } else if (e.code === 'ArrowDown') {
    e.preventDefault();
    tRex.setDuck(true);
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'ArrowDown') tRex.setDuck(false);
});

// ── Obstacle spawning (original gap math) ────────────────────────────
function gapFor(typeCfg, width, speed) {
  const minGap = Math.round(width * speed + typeCfg.minGap * GAP_COEFFICIENT);
  const maxGap = Math.round(minGap * MAX_GAP_COEFFICIENT);
  return minGap + Math.floor(Math.random() * (maxGap - minGap));
}

function pickType() {
  const names = ['CACTUS_SMALL', 'CACTUS_LARGE'];
  if (ALLOW_BIRDS && currentSpeed >= OB_TYPES.PTERODACTYL.minSpeed) {
    names.push('PTERODACTYL');
  }
  // Original duplication rule: max 2 identical in a row
  let name, tries = 0;
  do {
    name = names[Math.floor(Math.random() * names.length)];
    tries++;
  } while (tries < 5 &&
           obstacleHistory.length >= MAX_OBSTACLE_DUPLICATION &&
           obstacleHistory.slice(-MAX_OBSTACLE_DUPLICATION).every(n => n === name));
  return name;
}

function spawnObstacle() {
  const name = pickType();
  const cfg  = OB_TYPES[name];
  obstacleCount++;

  if (name === 'PTERODACTYL') {
    const y = cfg.yPositions[Math.floor(Math.random() * cfg.yPositions.length)];
    obstacles.push({
      type: name, x: W, y, w: cfg.w, h: cfg.h,
      gap: gapFor(cfg, cfg.w, currentSpeed),
      speedOffset: Math.random() > 0.5 ? cfg.speedOffset : -cfg.speedOffset,
      group: 1,
    });
  } else {
    // Group size: original allows multiples once speed > multipleSpeed
    let group = 1;
    if (currentSpeed > cfg.multipleSpeed) {
      group = 1 + Math.floor(Math.random() * MAX_OBSTACLE_LENGTH);
    }
    const w = cfg.w * group;
    obstacles.push({
      type: name, x: W, y: cfg.yPos, w, h: cfg.h,
      gap: gapFor(cfg, w, currentSpeed),
      speedOffset: 0,
      group,
    });
  }
  obstacleHistory.push(name);
  if (obstacleHistory.length > 4) obstacleHistory.shift();
}

// ── Collision (effective boxes tuned to reproduce original behavior) ─
//   low bird (y=100): hits both standing & ducking → must jump
//   mid bird (y=75):  hits standing, clears ducking → must duck
//   high bird (y=50): clears standing → run under
function checkCollision() {
  let dx, dy, dw, dh;
  if (ducking) {
    dx = TREX.X + 2;  dy = GROUND_LINE - TREX.H_DUCK;
    dw = TREX.W_DUCK - 8;  dh = TREX.H_DUCK;
  } else {
    dx = TREX.X + 6;  dy = dinoY + 2;
    dw = TREX.W - 14;  dh = TREX.H - 4;
  }

  for (const ob of obstacles) {
    let ox, oy, ow, oh;
    if (ob.type === 'PTERODACTYL') {
      ox = ob.x + 12; oy = ob.y + 10;
      ow = ob.w - 24; oh = ob.h - 18;
    } else {
      ox = ob.x + 2;  oy = ob.y + 2;
      ow = ob.w - 4;  oh = ob.h - 2;
    }
    if (dx < ox + ow && dx + dw > ox && dy < oy + oh && dy + dh > oy) {
      if (ob.type === 'PTERODACTYL') {
        const label = {100: 'low', 75: 'mid', 50: 'high'}[ob.y] || '?';
        return 'bird_' + label;
      }
      return ob.type.toLowerCase();
    }
  }
  return null;
}

// ── Update (dt-based, original frame normalisation) ─────────────────
function update(dt) {
  if (crashed || !started) return;

  const fe = dt / MS_PER_FRAME;      // framesElapsed — original normalisation
  runningTime += dt;

  // Jump physics (original updateJump)
  if (jumping) {
    const mult = speedDrop ? SPEED_DROP_COEFFICIENT : 1;
    dinoY        += jumpVelocity * mult * fe;
    jumpVelocity += GRAVITY * fe;
    // Cap ascent once max height reached (original endJump behavior)
    if (dinoY < MAX_JUMP_Y && jumpVelocity < DROP_VELOCITY) {
      jumpVelocity = DROP_VELOCITY;
    }
    if (dinoY >= TREX_GROUND_Y) {
      dinoY        = TREX_GROUND_Y;
      jumpVelocity = 0;
      jumping      = false;
      speedDrop    = false;
    }
  }

  // Obstacles move at game speed (+ bird offset); count clears on pass
  for (const ob of obstacles) {
    ob.x -= (currentSpeed + (ob.speedOffset || 0)) * fe;
    if (!ob.counted && ob.x + ob.w < TREX.X) {
      ob.counted = true;
      obstaclesCleared++;
    }
  }
  obstacles = obstacles.filter(ob => ob.x + ob.w > -10);

  // Spawn: original horizon logic — first obstacle after CLEAR_TIME,
  // then each next when the gap behind the last one has scrolled in.
  if (runningTime > CLEAR_TIME) {
    if (obstacles.length === 0) {
      spawnObstacle();
    } else {
      const last = obstacles[obstacles.length - 1];
      if (W - (last.x + last.w) > last.gap) spawnObstacle();
    }
  }

  // Distance & speed (original: distance += speed·fe, accel per frame)
  rawDistance += currentSpeed * fe;
  distanceRan  = rawDistance * 0.025;          // displayed-score units
  if (currentSpeed < MAX_SPEED) {
    currentSpeed = Math.min(MAX_SPEED, currentSpeed + ACCELERATION * fe);
  }

  groundOffset = (groundOffset + currentSpeed * fe) % 60;
  legFrame  = (legFrame  + fe / 6) % 1;     // original run anim ~12fps
  wingFrame = (wingFrame + fe / 12) % 1;    // bird flap slower

  // Clouds drift at fraction of speed
  for (const cl of clouds) {
    cl.x -= currentSpeed * 0.2 * fe;
    if (cl.x < -50) { cl.x = W + 30; cl.y = 20 + Math.random() * 40; }
  }

  const cause = checkCollision();
  if (cause !== null) {
    crashed = true;
    deathCause = cause;
    if (distanceRan > highScore) highScore = distanceRan;
  }
}

// ── Draw ─────────────────────────────────────────────────────────────
function drawGround() {
  ctx.fillStyle = BODY_COL;
  ctx.fillRect(0, (GROUND_LINE + 1) * SCALE, W * SCALE, SCALE);
  // texture bumps
  for (let i = 0; i < 16; i++) {
    const gx = ((i * 60 - groundOffset) % (W + 60)) - 30;
    ctx.fillRect(gx * SCALE, (GROUND_LINE + 4) * SCALE, 8 * SCALE, SCALE);
    ctx.fillRect((gx + 22) * SCALE, (GROUND_LINE + 6) * SCALE, 4 * SCALE, SCALE);
  }
}

function drawScore() {
  const hi  = String(Math.floor(highScore)).padStart(5, '0');
  const cur = String(Math.floor(distanceRan)).padStart(5, '0');
  ctx.fillStyle = '#737373';
  ctx.font = `bold ${11 * SCALE}px monospace`;
  ctx.textAlign = 'right';
  ctx.fillText(`HI ${hi} ${cur}`, (W - 10) * SCALE, 18 * SCALE);
  ctx.textAlign = 'left';
}

function drawDino() {
  if (ducking && !jumping) {
    blit(SPR.duck, TREX.X, GROUND_LINE - TREX.H_DUCK);
    return;
  }
  blit(SPR.body, TREX.X, dinoY);
  const legs = jumping ? SPR.legsStand
             : (legFrame < 0.5 ? SPR.legsA : SPR.legsB);
  blit(legs, TREX.X, dinoY + 33);
}

function drawObstacle(ob) {
  if (ob.type === 'PTERODACTYL') {
    blit(wingFrame < 0.5 ? SPR.birdUp : SPR.birdDown, ob.x, ob.y);
  } else {
    const spr = ob.type === 'CACTUS_SMALL' ? SPR.cactusS : SPR.cactusL;
    const unit = OB_TYPES[ob.type].w;
    for (let i = 0; i < ob.group; i++) {
      blit(spr, ob.x + i * unit, ob.y);
    }
  }
}

function draw() {
  ctx.fillStyle = BG_COL;
  ctx.fillRect(0, 0, W * SCALE, H * SCALE);

  for (const cl of clouds) blit(SPR.cloud, cl.x, cl.y);
  drawGround();
  for (const ob of obstacles) drawObstacle(ob);
  drawDino();
  drawScore();

  if (crashed) {
    ctx.fillStyle = '#535353';
    ctx.font = `bold ${12 * SCALE}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('G A M E  O V E R', (W / 2) * SCALE, 55 * SCALE);
    ctx.textAlign = 'left';
  } else if (!started) {
    ctx.fillStyle = '#535353';
    ctx.font = `${10 * SCALE}px monospace`;
    ctx.fillText('Press SPACE or send a jump to start', 180 * SCALE, 60 * SCALE);
  }
}

// ── Main loop ────────────────────────────────────────────────────────
// ?fixedstep=1 — fixed-timestep physics (accumulator): update() always runs
// with fe=1 regardless of display refresh. On >60Hz displays the variable-dt
// path integrates the jump in sub-frame Euler steps, producing a LOWER/
// SHORTER jump arc than the sim/lockstep/60Hz (fe=1) arc — enough to kill
// tight clears (triple large cacti at speed ~7.5). Fidelity fix, A/B-gated.
const FIXED_STEP = Q.get('fixedstep') === '1';
let stepAcc = 0;
function loop(ts) {
  // Lockstep mode: the agent advances the game via window.stepFrames(),
  // so the real-time rAF loop must NOT also step physics.
  if (window.__lockstep) { animId = null; return; }
  const dt = lastTime !== null ? Math.min(ts - lastTime, 100) : MS_PER_FRAME;
  lastTime = ts;
  if (FIXED_STEP) {
    stepAcc += dt;
    while (stepAcc >= MS_PER_FRAME) { update(MS_PER_FRAME); stepAcc -= MS_PER_FRAME; }
  } else {
    update(dt);
  }
  draw();
  animId = requestAnimationFrame(loop);
}

// ── Lockstep interface (deterministic, jitter-free eval/demo) ─────────
// Matches DinoEnv: one decision = action_repeat frames, each with fe=1.
// enableLockstep() halts the wall-clock loop; stepFrames(n) advances
// exactly n physics frames and returns the same state shape as
// chrome_driver's _JS_GET_STATE.
window.__lockstep = false;
window.enableLockstep = function () {
  window.__lockstep = true;
  if (animId) { cancelAnimationFrame(animId); animId = null; }
};
window.stepFrames = function (n) {
  for (let i = 0; i < n; i++) {
    if (crashed || !started) break;
    update(MS_PER_FRAME);   // fe = 1, identical to DinoEnv._advance_frame()
  }
  draw();
  return {
    crashed:  crashed,
    score:    distanceRan,
    speed:    currentSpeed,
    groundY:  TREX_GROUND_Y,
    dinoY:    dinoY,
    dinoVelY: jumpVelocity,
    jumping:  jumping,
    ducking:  ducking,
    cleared:  obstaclesCleared,
    runningTime: runningTime,
    obstacles: obstacles.slice(0, 2).map(function (o) {
      return { x: o.x, y: o.y, w: o.w, h: o.h, type: o.type };
    }),
  };
};

// ── Fidelity-probe hook (test scaffolding, lockstep only) ────────────
// Deterministic single-obstacle scenario: fixed speed, one cactus group at
// the right edge, no follow-up spawns (gap 9999). Mirrors the sim-side
// probe in fidelity_probe.py so jump windows can be compared 1:1.
window.setupScenario = function (speed, type, group, x) {
  runner.restart();
  currentSpeed = speed;
  const cfg = OB_TYPES[type];
  obstacles = [{ type: type, x: (x || W), y: cfg.yPos, w: cfg.w * group,
                 h: cfg.h, gap: 9999, speedOffset: 0, group: group }];
  obstacleHistory = [type];
  return true;
};

// Auto-start: the RL trainer drives the game via JS injection.
started = true;
animId  = requestAnimationFrame(loop);

})();
</script>
